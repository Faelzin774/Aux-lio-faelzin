<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faelzin Store • Multi-Acesso</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { min-height: 100vh; background: #0a0c10; display: flex; justify-content: center; align-items: center; padding: 15px; }

        /* --- LOGIN --- */
        .key-screen {
            background: #1a212c; border-radius: 40px; padding: 35px; max-width: 400px; width: 100%; text-align: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.9); border: 2px solid #ffaa33;
        }
        .key-screen h1 { font-size: 2.2rem; background: linear-gradient(135deg, #ffd966, #ffaa33); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; font-weight: 800; }
        .key-screen input { width: 100%; background: #0e131c; border: 2px solid #ffaa33; padding: 15px; border-radius: 30px; color: white; text-align: center; margin-bottom: 15px; outline: none; font-weight: bold; letter-spacing: 2px; }
        .key-screen button { width: 100%; background: #ffaa33; border: none; padding: 15px; border-radius: 30px; font-weight: 700; cursor: pointer; color: #000; font-size: 1.1rem; }

        /* --- PAINEL BASE --- */
        .panel { background: #1a212c; border-radius: 30px; padding: 20px; max-width: 480px; width: 100%; border: 2px solid #ffaa33; display: none; }
        
        /* Tema Rage */
        .panel.rage-mode { border-color: #ff0000; background: #050505; box-shadow: 0 0 20px #ff0000; }
        .panel.rage-mode h2 { color: #ff0000 !important; }

        .tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab { flex: 1; text-align: center; padding: 10px; border-radius: 20px; background: rgba(0,0,0,0.3); color: #fff; cursor: pointer; font-size: 0.8rem; font-weight: bold; border: 1px solid transparent; }
        .tab.active { background: #ffaa33; color: #000; border-color: #fff; }

        .section { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid rgba(255,170,51,0.2); }
        .rage-mode .section { border-color: rgba(255,0,0,0.3); }
        
        .section-title { color: #ffaa33; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid rgba(255,170,51,0.1); padding-bottom: 5px; }
        .rage-mode .section-title { color: #ff0000; border-color: rgba(255,0,0,0.2); }

        /* --- FEATURES --- */
        .feature-item { padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .feature-header { display: flex; justify-content: space-between; align-items: center; }
        .feature-name { color: #fff; font-weight: 600; font-size: 0.95rem; }
        .feature-desc { color: #888; font-size: 0.75rem; margin-top: 4px; line-height: 1.3; padding-right: 40px; }

        /* Switch */
        .switch { position: relative; width: 40px; height: 20px; flex-shrink: 0; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #333; transition: 0.3s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background: #fff; transition: 0.3s; border-radius: 50%; }
        input:checked + .slider { background: #ffaa33; }
        .rage-mode input:checked + .slider { background: #ff0000; }
        input:checked + .slider:before { transform: translateX(20px); }

        /* Botões */
        .btn-main { width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; margin-bottom: 10px; text-transform: uppercase; font-size: 1rem; }
        .btn-vip { background: #ffaa33; color: #000; border: 1px solid #fff; }
        .btn-rage { background: #ff0000; color: #fff; border: 1px solid #500; }

        /* --- MODAL BYPASS --- */
        .modal-bypass { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 10000; justify-content: center; align-items: center; 
        }
        .bypass-content { width: 85%; max-width: 400px; text-align: center; font-family: monospace; }
        .progress-bg { width: 100%; height: 12px; background: #111; border-radius: 10px; margin: 25px 0; overflow: hidden; border: 1px solid #333; }
        .progress-bar { width: 0%; height: 100%; background: #ff0000; transition: 0.1s; box-shadow: 0 0 15px #f00; }
    </style>
</head>
<body>

    <!-- TELA DE LOGIN -->
    <div class="key-screen" id="loginScreen">
        <h1>FAELZIN STORE</h1>
        <input type="text" id="keyInput" placeholder="DIGITE A CHAVE">
        <button onclick="login()">ENTRAR NO PAINEL</button>
        <p id="error" style="color:#ff4444; margin-top:15px; display:none; font-weight:bold">❌ KEY INVÁLIDA!</p>
    </div>
    <!-- PAINEL PRINCIPAL -->
    <div class="panel" id="mainPanel">
        <h2 id="pTitle" style="color: #ffaa33; text-align: center; margin-bottom: 20px; letter-spacing: 2px;">FAELZIN VIP</h2>
        
        <!-- ABAS (SÓ VIP) -->
        <div class="tabs" id="tabBar">
            <div class="tab active" onclick="showTab('inj')">INJEÇÃO</div>
            <div class="tab" onclick="showTab('sens')">SENSIVIDADE</div>
            <div class="tab" onclick="showTab('conf')">CORES</div>
        </div>

        <!-- CONTEÚDO INJEÇÃO -->
        <div id="content-inj">
            <button class="btn-main" id="btnAction" onclick="ativarBypass()">ATIVAR BYPASS</button>
            <div id="list-functions">
                <!-- Funções carregadas via JavaScript -->
            </div>
        </div>

        <!-- CONTEÚDO SENSIVIDADE -->
        <div id="content-sens" style="display:none">
            <div class="section">
                <div class="section-title">📱 GERADOR SMART</div>
                <select id="device" style="width:100%; padding:12px; border-radius:10px; background:#0e131c; color:#fff; border:1px solid #ffaa33; outline:none">
                    <option>SAMSUNG (TODOS)</option>
                    <option>MOTOROLA (TODOS)</option>
                    <option>XIAOMI / REDMI / POCO</option>
                    <option>IPHONE / IPAD</option>
                    <option>REALME / INFINIX</option>
                </select>
                <button class="btn-main btn-vip" style="margin-top:20px" onclick="gerarSens()">GERAR AGORA</button>
                <div id="sensRes" style="margin-top:15px; color:#00ff00; font-family:monospace; font-size:0.9rem; background:rgba(0,0,0,0.5); padding:10px; border-radius:10px; display:none"></div>
            </div>
        </div>

        <!-- BOTÃO SAIR -->
        <p onclick="location.reload()" style="color:#666; text-align:center; font-size:0.7rem; cursor:pointer; margin-top:10px">LOGOUT / SAIR</p>
    </div>

    <!-- MODAL DO BYPASS -->
    <div class="modal-bypass" id="modalBypass">
        <div class="bypass-content">
            <h2 id="bypassStatus" style="color:#ff0000; letter-spacing:3px">INJETANDO...</h2>
            <div class="progress-bg"><div class="progress-bar" id="pBar"></div></div>
            <p id="pLogs" style="color:#00ff00; font-size:0.8rem; height:20px"></p>
        </div>
    </div>

    <script>
        let mode = "";

        function login() {
            const key = document.getElementById('keyInput').value.trim();
            if(key === "FAEL-VIP-2026") {
                mode = "VIP";
                setupVip();
            } else if(key === "dono456") {
                mode = "RAGE";
                setupRage();
            } else {
                document.getElementById('error').style.display = "block";
            }
        }

        function setupVip() {
            document.getElementById('loginScreen').style.display = "none";
            document.getElementById('mainPanel').style.display = "block";
            document.getElementById('btnAction').className = "btn-main btn-vip";
            renderFunctions([
                {n: "Silent Aim", d: "Mira assistida silenciosa que não treme."},
                {n: "Auto Lock", d: "Trava a mira automaticamente no oponente."},
                {n: "Anti-Spread", d: "Reduz o espalhamento das balas."},
                {n: "No Recoil", d: "Sua mira não sobe ao receber dano."}
            ]);
        }

        function setupRage() {
            document.getElementById('loginScreen').style.display = "none";
            const p = document.getElementById('mainPanel');
            p.style.display = "block";
            p.className = "panel rage-mode";
            document.getElementById('pTitle').innerText = "RAGE EXTREME";
            document.getElementById('tabBar').style.display = "none";
            document.getElementById('btnAction').className = "btn-main btn-rage";
            
            renderFunctions([
                {n: "Voar", d: "Permite que o personagem se mova pelo ar, ignorando a gravidade."},
                {n: "Invisível", d: "Torna o personagem invisível para outros jogadores."},
                {n: "Aimbot 100% Cabeça", d: "Auto Headshot: Mira e atira na cabeça com 100% de precisão."},
                {n: "Aimbot Legít", d: "Aim Assist: Ajuda na mira de forma sutil."},
                {n: "Matar no Avião", d: "Kill in Plane: Ative antes do botão de pular aparecer."},
                {n: "Aimkill / Matar Todos", d: "Mata todos no mapa trocando de arma sem parar."},
                {n: "Wallhack", d: "Ver inimigos através de paredes e objetos."},
                {n: "Teleporte", d: "Mover o personagem instantaneamente para qualquer local."},
                {n: "Speed Hack", d: "Aumentar a velocidade de movimento além do normal."},
                {n: "Damage Booster", d: "Faz com que suas armas causem muito mais dano."},
                {n: "No Recoil", d: "Elimina completamente o recuo das armas."},
                {n: "ESP", d: "Exibe nome, distância, vida e arma através de caixas."},
                {n: "High Damage", d: "Variante potente de dano aumentado."},
                {n: "Auto Fire", d: "Atira automaticamente ao detectar inimigo."}
            ]);
        }

        function renderFunctions(list) {
            const container = document.getElementById('list-functions');
            container.innerHTML = `<div class="section-title">LISTA DE FUNÇÕES</div>`;
            list.forEach(f => {
                container.innerHTML += `
                    <div class="feature-item">
                        <div class="feature-header">
                            <span class="feature-name">${f.n}</span>
                            <label class="switch"><input type="checkbox"><span class="slider"></span></label>
                        </div>
                        <div class="feature-desc">${f.d}</div>
                    </div>
                `;
            });
        }

        function ativarBypass() {
            const modal = document.getElementById('modalBypass');
            const bar = document.getElementById('pBar');
            const log = document.getElementById('pLogs');
            const status = document.getElementById('bypassStatus');
            
            modal.style.display = "flex";
            let p = 0;
            const logs = ["Limpando logs...", "Autenticando...", "Injetando Bypass...", "Ocultando ID...", "Antiban Ativado!", "Finalizando..."];
            
            const interval = setInterval(() => {
                p += 1;
                bar.style.width = p + "%";
                if(p % 15 === 0) log.innerText = logs[Math.floor(p/17)] || "Concluindo...";
                
                if(p >= 100) {
                    clearInterval(interval);
                    status.innerText = "ATIVADO COM SUCESSO!";
                    status.style.color = "#00ff00";
                    setTimeout(() => {
                        modal.style.display = "none";
                        document.getElementById('btnAction').innerText = "ATIVADO ✅";
                        document.getElementById('btnAction').style.opacity = "0.5";
                        document.getElementById('btnAction').disabled = true;
                    }, 1200);
                }
            }, 100); // 100ms * 100 passos = 10 segundos
        }

        function showTab(t) {
            document.getElementById('content-inj').style.display = t === 'inj' ? 'block' : 'none';
            document.getElementById('content-sens').style.display = t === 'sens' ? 'block' : 'none';
            const tabs = document.querySelectorAll('.tab');
            tabs[0].classList.toggle('active', t === 'inj');
            tabs[1].classList.toggle('active', t === 'sens');
        }

        function gerarSens() {
            const res = document.getElementById('sensRes');
            res.style.display = "block";
            res.innerText = "CALIBRANDO...";
            setTimeout(() => {
                const s = () => Math.floor(Math.random() * 50) + 140;
                res.innerHTML = `✅ SENS GERADA:<br>GERAL: ${s()}<br>RED DOT: ${s()}<br>MIRA 2X: ${s()}<br>MIRA 4X: ${s()}<br>DPI: ${Math.floor(Math.random()*400)+400}`;
            }, 2000);
        }
    </script>
</body>
</html>
