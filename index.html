<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FAEL - VIRTUAL ASSIST PRO</title>
    <style>
        :root {
            --hacker: #00ff00;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.07);
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px 0; /* Espaço para rolar */
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Alinha no topo para permitir rolar */
            min-height: 100vh;
            overflow-y: auto; /* HABILITA ROLAGEM */
        }

        /* --- LOGIN --- */
        #login-screen {
            width: 280px;
            text-align: center;
            padding: 40px;
            background: #0a0a0a;
            border-radius: 20px;
            border: 2px solid #222;
            margin-top: 50px;
        }

        .key-input {
            width: 90%;
            padding: 15px;
            margin: 20px 0;
            background: #000;
            border: 1px solid var(--hacker);
            color: var(--hacker);
            text-align: center;
            border-radius: 8px;
            outline: none;
        }

        .btn-login {
            background: var(--hacker);
            color: #000;
            border: none;
            padding: 12px;
            cursor: pointer;
            font-weight: 900;
            border-radius: 5px;
            width: 100%;
        }

        /* --- MENU --- */
        #main-menu {
            display: none;
            width: 340px;
            padding: 20px;
            background: #0d0d0d;
            border-radius: 24px;
            border: 1px solid #333;
            margin-bottom: 50px; /* Espaço no fim */
        }

        .main-title {
            text-align: center;
            margin-bottom: 15px;
        }

        .main-title h1 {
            color: #fff;
            font-size: 20px; /* TÍTULO PEQUENO COMO PEDIDO */
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--hacker);
        }

        .category-title {
            color: var(--hacker);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 15px 0 8px 5px;
            font-weight: 800;
            opacity: 0.7;
        }

        .option-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            background: var(--glass);
            padding: 12px 15px;
            border-radius: 10px;
            font-size: 13px;
        }

        /* Switch */
        .switch { position: relative; display: inline-block; width: 38px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333; transition: .3s; border-radius: 20px;
        }
        .slider:before {
            position: absolute; content: ""; height: 14px; width: 14px;
            left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--hacker); }
        input:checked + .slider:before { transform: translateX(18px); }

        /* SEÇÃO BYPASS */
        .bypass-container {
            text-align: center;
            background: rgba(0, 255, 0, 0.03);
            padding: 15px;
            border-radius: 12px;
            border: 1px dashed var(--hacker);
            margin: 15px 0;
        }

        .bypass-text {
            color: var(--hacker);
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 10px;
            display: block;
        }

        .btn-bypass-action {
            background: transparent;
            color: var(--hacker);
            border: 1px solid var(--hacker);
            padding: 8px 25px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
        }

        .btn-inject {
            background: var(--hacker);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: 900;
            font-size: 15px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            text-transform: uppercase;
        }

        #injection-screen {
            display: none;
            position: fixed;
            top:0; left:0;
            width: 100%; height: 100%;
            background: #000;
            padding: 30px;
            box-sizing: border-box;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="login-screen">
        <h2 style="font-size: 18px; color: #fff; margin: 0;">FAEL <span style="color: var(--hacker);">VIP</span></h2>
        <input type="text" class="key-input" placeholder="SUA CHAVE" id="keyInput">
        <button class="btn-login" onclick="validarKey()">ENTRAR</button>
    </div>

    <!-- MENU PRINCIPAL -->
    <div id="main-menu">
        <div class="main-title">
            <h1>FAEL ASSIST</h1>
        </div>
        
        <div class="category-title">Ajustes</div>
        <div class="option-row">Sensibilidade 2.0 <label class="switch"><input type="checkbox" checked><span class="slider"></span></label></div>
        <div class="option-row">Mira Fixa <label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
        <div class="option-row">No Recoil <label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
        <div class="option-row">Otimizar FPS <label class="switch"><input type="checkbox" checked><span class="slider"></span></label></div>
        <div class="option-row">Redução de Lag <label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
        <div class="option-row">Touch Rápido <label class="switch"><input type="checkbox"><span class="slider"></span></label></div>

        <!-- SEÇÃO BYPASS -->
        <div class="bypass-container">
            <span class="bypass-text">Bypass anti-BAN anti-BLACKLIST</span>
            <button class="btn-bypass-action" onclick="this.innerText='ATIVADO ✅'; this.style.color='#fff';">Bypass</button>
        </div>

        <button class="btn-inject" onclick="iniciarInjecao()">INJETAR</button>
    </div>

    <!-- TELA DE LOGS -->
    <div id="injection-screen">
        <div id="logs" style="color: var(--hacker); font-family: monospace; font-size: 13px; line-height: 1.8;"></div>
    </div>

<script>
    function validarKey() {
        if(document.getElementById('keyInput').value === "FAEL-VIP-2026") {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-menu').style.display = 'block';
        } else {
            alert("CHAVE INCORRETA!");
        }
    }

    function iniciarInjecao() {
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('injection-screen').style.display = 'block';
        const logs = [
            "> [OK] Iniciando...",
            "> [MOD] Sensibilidade OK",
            "> [MOD] Recoil Ajustado",
            "> [SAFE] Bypass Ativo",
            "> [SUCCESS] Finalizado!"
        ];
        let i = 0;
        const interval = setInterval(() => {
            if(i < logs.length) {
                const d = document.createElement('div');
                d.textContent = logs[i];
                document.getElementById('logs').appendChild(d);
                i++;
            } else {
                clearInterval(interval);
                setTimeout(() => { alert("ATIVADO!"); location.reload(); }, 1000);
            }
        }, 500);
    }
</script>
</body>
</html>
