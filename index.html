<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FAEL - VIRTUAL ASSIST PRO</title>
    <style>
        :root {
            --hacker: #00ff00; /* Verde Neon */
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.07);
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* --- LOGIN --- */
        #login-screen {
            width: 280px;
            text-align: center;
            padding: 40px;
            background: #0a0a0a;
            border-radius: 20px;
            border: 2px solid #222;
        }

        .key-input {
            width: 90%;
            padding: 15px;
            margin: 20px 0;
            background: #000;
            border: 1px solid var(--hacker);
            color: var(--hacker);
            text-align: center;
            border-radius: 8px;
            font-family: monospace;
            outline: none;
        }

        .btn-login {
            background: var(--hacker);
            color: #000;
            border: none;
            padding: 12px;
            cursor: pointer;
            font-weight: 900;
            border-radius: 5px;
            width: 100%;
        }

        /* --- MENU --- */
        #main-menu {
            display: none;
            width: 350px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 25px;
            background: #0d0d0d;
            border-radius: 24px;
            border: 1px solid #333;
        }

        .main-title {
            text-align: center;
            margin-bottom: 25px;
        }

        .main-title h1 {
            color: #fff;
            font-size: 32px;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 20px var(--hacker);
        }

        .category-title {
            color: var(--hacker);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 20px 0 10px 5px;
            font-weight: 800;
            opacity: 0.8;
        }

        .option-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            background: var(--glass);
            padding: 14px 15px;
            border-radius: 12px;
            font-size: 14px;
        }

        /* Switch */
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333; transition: .3s; border-radius: 20px;
        }
        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px;
            left: 4px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--hacker); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* SEÇÃO BYPASS PEDIDA */
        .bypass-container {
            text-align: center;
            background: rgba(0, 255, 0, 0.05);
            padding: 20px;
            border-radius: 15px;
            border: 1px dashed var(--hacker);
            margin-top: 20px;
        }

        .bypass-text {
            color: var(--hacker);
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 12px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-bypass-action {
            background: transparent;
            color: var(--hacker);
            border: 1px solid var(--hacker);
            padding: 10px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-bypass-action:active {
            background: var(--hacker);
            color: #000;
        }

        .btn-inject {
            background: var(--hacker);
            color: #000;
            border: none;
            padding: 20px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            text-transform: uppercase;
        }

        #injection-screen {
            display: none;
            position: fixed;
            width: 100%; height: 100%;
            background: #000;
            padding: 30px;
            box-sizing: border-box;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="login-screen">
        <h1 style="font-size: 22px; color: #fff;">FAEL <span style="color: var(--hacker);">VIP</span></h1>
        <input type="text" class="key-input" placeholder="SUA CHAVE" id="keyInput">
        <button class="btn-login" onclick="validarKey()">ENTRAR</button>
    </div>

    <!-- MENU PRINCIPAL -->
    <div id="main-menu">
        <div class="main-title">
            <h1>FAEL ASSIST</h1>
            <div style="font-size: 10px; color: #666;">MODO SEGURO ATIVADO</div>
        </div>
        
        <div class="category-title">Auxílios Ativos</div>
        <div class="option-row">Otimizar Sensibilidade <label class="switch"><input type="checkbox" checked><span class="slider"></span></label></div>
        <div class="option-row">Mira Estabilizada <label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
        <div class="option-row">Redução de Recoil <label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
        <div class="option-row">High FPS Boost <label class="switch"><input type="checkbox" checked><span class="slider"></span></label></div>

        <!-- SEÇÃO QUE VOCÊ PEDIU -->
        <div class="bypass-container">
            <span class="bypass-text">Bypass anti-BAN anti-BLACKLIST</span>
            <button class="btn-bypass-action" onclick="this.innerText='ATIVADO ✅'; this.style.borderColor='#fff'; this.style.color='#fff'">Bypass</button>
        </div>

        <button class="btn-inject" onclick="iniciarInjecao()">INJETAR SCRIPTS</button>
    </div>

    <!-- LOGS -->
    <div id="injection-screen">
        <div id="logs" style="color: var(--hacker); font-family: monospace; font-size: 13px; line-height: 1.8;"></div>
    </div>

<script>
    function validarKey() {
        if(document.getElementById('keyInput').value === "FAEL-VIP-2026") {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-menu').style.display = 'block';
        } else {
            alert("KEY INCORRETA!");
        }
    }

    function iniciarInjecao() {
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('injection-screen').style.display = 'block';
        
        const logs = [
            "> [OK] Conectando ao Banco de Dados...",
            "> [MOD] Aplicando Sensibilidade Dinâmica...",
            "> [MOD] Reduzindo Recoil das Armas...",
            "> [SAFE] Ativando Bypass Anti-Ban...",
            "> [SAFE] Proteção Anti-Blacklist OK.",
            "> [SUCCESS] Scripts Injetados com Sucesso!"
        ];

        let i = 0;
        const interval = setInterval(() => {
            if(i < logs.length) {
                const d = document.createElement('div');
                d.textContent = logs[i];
                document.getElementById('logs').appendChild(d);
                i++;
            } else {
                clearInterval(interval);
                setTimeout(() => {
                    alert("SISTEMA ATIVADO COM SUCESSO!");
                    location.reload(); 
                }, 1000);
            }
        }, 600);
    }
</script>
</body>
</html>
